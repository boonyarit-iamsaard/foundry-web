name: 'foundry-web'

services:
  postgres:
    container_name: 'foundry-web-postgres'
    image: 'docker.io/postgres:17-alpine'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-foundry-web}
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: 'always'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - foundry-web-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -h localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    container_name: 'foundry-web-mailpit'
    image: 'docker.io/axllent/mailpit:latest'
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '${MAILPIT_DASHBOARD_PORT:-8025}:8025'
    restart: 'always'
    networks:
      - foundry-web-network

volumes:
  pgdata:
    name: 'foundry-web-pgdata'

networks:
  foundry-web-network:
    name: 'foundry-web-network'
